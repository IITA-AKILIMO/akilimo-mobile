name: Android Unit Tests (Extreme)

on:
  workflow_run:
    workflows: [ "CI Gate" ]
    types:
      - completed

jobs:
  unit_test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    concurrency:
      group: unit-tests-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ⚡ MASSIVE SPEED BOOST: Gradle cache + dependency cache
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      # ⚡ AVOID CONFIGURATION OVERHEAD
      - name: Run only affected tests
        run: |
          ./gradlew testDebugUnitTest \
            --build-cache \
            --configuration-cache \
            --parallel \
            --max-workers=4 \
            --daemon