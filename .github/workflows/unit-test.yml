name: Android Unit Tests

on:
  pull_request:
    paths:
      - 'app/src/**'
      - '**/*.gradle*'
      - 'gradle.properties'
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # 🚀 big speedup (no full history)

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle   # 🚀 dependency cache

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests (only debug)
        run: ./gradlew testDebugUnitTest --build-cache --daemon --parallel

      - name: Upload test reports (only if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/