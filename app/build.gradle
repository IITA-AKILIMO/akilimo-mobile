    implementation 'com.mikhaellopez:circularimageview:3.2.0'           // circle image view
//    implementation 'com.github.pchmn:MaterialChipsInput:1.0.5'          // material chip
//    implementation 'com.hootsuite.android:nachos:1.1.1'                 // material chips
    implementation 'com.crystal:crystalrangeseekbar:1.1.3'              // range seek bar
    implementation 'net.danlew:android.joda:2.10.3'
    implementation 'com.github.mohammadatif:Animatoo:master'
    implementation 'com.crashlytics.sdk.android:crashlytics:2.10.1'
    implementation 'com.getkeepsafe.taptargetview:taptargetview:1.13.0' //feature discovery library
    implementation 'eu.the4thfloor.volley:com.android.volley:2015.05.28' //Volley library
    implementation 'com.fasterxml.jackson.core:jackson-core:2.10.0.pr1'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.10.0.pr1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.10.0.pr1'
    implementation 'com.nabinbhandari.android:permissions:3.7'
