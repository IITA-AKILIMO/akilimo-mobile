apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
//apply plugin: 'kotlin-kapt'
apply plugin: 'kotlin-android-extensions'

dependencies {
    debugImplementation "io.objectbox:objectbox-android-objectbrowser:$objectboxVersion"
    releaseImplementation "io.objectbox:objectbox-android:$objectboxVersion"
}
apply plugin: 'io.objectbox'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'io.fabric'

ext.versionMajor = 12
ext.versionMinor = 0
android {
    def buildNumber = computeBuildNumber()
    def appVersionCode = computeVersionCode()

    compileSdkVersion 29
    buildToolsVersion "29.0.2"
    defaultConfig {
        applicationId "com.iita.akilimo"
        minSdkVersion 19
        targetSdkVersion 29
        versionCode appVersionCode
        versionName "${computeVersionName()}.${buildNumber}"
        multiDexEnabled true
        vectorDrawables.useSupportLibrary = true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    buildTypes {
        release {
            minifyEnabled false //for some strange reson minifying causes the code to flip
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            pseudoLocalesEnabled true
        }
    }
//    dataBinding {
//        enabled = true
//    }
    lintOptions {
        checkReleaseBuilds false
        // Or, if you prefer, you can continue to check for errors in release builds,
        // but continue the build even when errors are found:
        abortOnError false
//        disable 'UselessParent', 'HardcodedText', 'LabelFor', 'UnusedResources'
    }
    dexOptions {
        javaMaxHeapSize "4g"
    }
    androidExtensions {
        experimental = true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

}

@SuppressWarnings("GrMethodMayBeStatic")
def computeVersionName() {
    return String.format('%d.%d', Integer.valueOf(System.env.VERSION_MAJOR ?: versionMajor), Integer.valueOf(System.env.VERSION_MINOR ?: versionMinor))
}

static def computeBuildNumber() {
    return Integer.valueOf(System.env.BUILD_NUMBER ?: 20)
}

def computeVersionCode() {
    long unixTimestamp = Instant.now().getEpochSecond()
    return unixTimestamp.intValue()
}


dependencies {
    implementation fileTree(dir: 'libs', include: ['*.aar', '*.jar'], exclude: [])
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'androidx.core:core-ktx:1.2.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    implementation 'androidx.recyclerview:recyclerview:1.2.0-alpha02'
    implementation "androidx.cardview:cardview:1.0.0"

    implementation 'androidx.multidex:multidex:2.0.1'

    // google library ------------------------------------------------------------------------
    implementation 'com.google.android.material:material:1.1.0'
    implementation 'com.google.android.gms:play-services-maps:17.0.0'
    implementation 'com.google.android.gms:play-services-places:17.0.0'
    implementation 'com.google.firebase:firebase-config:19.1.3'
    implementation 'com.google.firebase:firebase-analytics:17.3.0'
    implementation 'com.google.android:flexbox:0.3.2'                   // google flexible box
    implementation 'com.crashlytics.sdk.android:crashlytics:2.10.1'

