    compileOnly 'org.projectlombok:lombok:1.18.10'

    //If you are using Kotlin, replace annotationProcessor with kapt.
    annotationProcessor 'com.jakewharton:butterknife:10.2.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.10.0'
    annotationProcessor 'com.jakewharton:butterknife-compiler:10.2.0'
    annotationProcessor 'com.fasterxml.jackson.core:jackson-annotations:2.10.0.pr1'
    annotationProcessor 'org.projectlombok:lombok:1.18.10'

    testAnnotationProcessor 'com.fasterxml.jackson.core:jackson-annotations:2.10.0.pr1'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.10'
    testImplementation 'joda-time:joda-time:2.10.3'
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test:runner:1.2.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'

    //debugImplementation because LeakCanary should only run in debug builds.
    debugImplementation 'com.squareup.leakcanary:leakcanary-android:2.0-beta-3'
}

dependencies {
    implementation 'androidx.legacy:legacy-support-v4:+'
}

dependencies {
